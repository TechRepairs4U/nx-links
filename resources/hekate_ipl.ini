[config]
autoboot=0
autoboot_list=0
bootwait=0
verification=1
backlight=100
autohosoff=2
autonogc=1
updater2p=1

{--- Custom Firmware ---}

[CFW (EMUMMC)]
pkg3=atmosphere/package3
emummcforce=1
icon=bootloader/res/icon_payload_emu.bmp
usb3force=1
{}

[CFW (SYSMMC)]
pkg3=atmosphere/package3
emummc_force_disable=1
icon=bootloader/res/atmosphere.bmp
usb3force=1
{}

{--- Stock ---}
[Stock (SYSNAND)]
emummc_force_disable=1
pkg3=atmosphere/package3
stock=1
icon=bootloader/res/icon_switch.bmp
usb3force=1
{}



